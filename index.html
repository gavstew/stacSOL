<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- no-FOUC theme bootstrap. Reads the persisted user preference from
         localStorage (or falls back to OS prefers-color-scheme) and sets
         data-theme on <html> BEFORE the stylesheet evaluates [data-theme]
         rules. Without this, every page would briefly paint in the
         dark-mode palette before useTheme's effect ran on the client. -->
    <script>
      (function () {
        var s = localStorage.getItem('theme');
        var t = s === 'dark' || s === 'light'
          ? s
          : window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        document.documentElement.setAttribute('data-theme', t);
      })();
    </script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>stacSOL — the SOL of the thystaccfloweth</title>
    <meta name="description" content="stacSOL is the base trading asset for the thystaccfloweth ecosystem. Every cross-pair trade burns 6.9%. NAV climbs every five minutes the family is trading." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&family=JetBrains+Mono:wght@400;700;800&display=swap"
    />
  </head>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
